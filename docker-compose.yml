# ─────────────────────────────────────────────────────────────────────────────
# GBrain — Dokploy Compose deployment
#
# Database: self-hosted Supabase (separate Dokploy Compose project).
# GBrain connects to Supabase's db container via dokploy-network,
# which Dokploy creates automatically — no manual network setup needed.
#
# SERVICES:
#   gbrain         MCP HTTP server    (Traefik → port 8787)
#   gbrain-worker  Minions supervisor (internal only)
#
# SCHEDULED MAINTENANCE: Dokploy Schedule Jobs (see README Step 5)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── GBrain MCP Server ───────────────────────────────────────────────────────
  gbrain:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GBRAIN_REF: master
    restart: unless-stopped
    environment:
      # DATABASE_URL points to Supabase's db container via supabase-gbrain network.
      # Format: postgresql://postgres:PASSWORD@supabase-db:5432/postgres
      # Set in Dokploy Environment tab — see README Step 3.
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required — see README Step 3}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GBRAIN_PORT: "8787"
      GBRAIN_ENGINE: postgres
      GBRAIN_BRAIN_PATH: /brain
    volumes:
      - /var/www/hilvara/gbrain/brain:/brain
      - /var/www/hilvara/gbrain/config:/root/.gbrain
    entrypoint: ["/entrypoint.sh"]
    networks:
      - gbrain-internal      # gbrain ↔ worker
      - dokploy-network      # Traefik routing + Supabase db access
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.gbrain.rule=Host(`${GBRAIN_DOMAIN}`)"
      - "traefik.http.routers.gbrain.entrypoints=websecure"
      - "traefik.http.routers.gbrain.tls=true"
      - "traefik.http.routers.gbrain.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gbrain.service=gbrain-svc"
      - "traefik.http.services.gbrain-svc.loadbalancer.server.port=8787"
      - "traefik.http.routers.gbrain-http.rule=Host(`${GBRAIN_DOMAIN}`)"
      - "traefik.http.routers.gbrain-http.entrypoints=web"
      - "traefik.http.routers.gbrain-http.middlewares=redirect-to-https@file"

  # ── Minions Worker ──────────────────────────────────────────────────────────
  gbrain-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      gbrain:
        condition: service_started
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GBRAIN_ENGINE: postgres
      GBRAIN_BRAIN_PATH: /brain
      MINIONS_CONCURRENCY: ${MINIONS_CONCURRENCY:-4}
    volumes:
      - /var/www/hilvara/gbrain/brain:/brain
      - /var/www/hilvara/gbrain/config:/root/.gbrain
    entrypoint: ["/worker-entrypoint.sh"]
    networks:
      - gbrain-internal      # gbrain ↔ worker
      - dokploy-network      # Supabase db access (Minions queue)

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  gbrain-internal:
    driver: bridge            # gbrain ↔ gbrain-worker (private)

  dokploy-network:
    external: true            # Dokploy creates this — Traefik + Supabase db access
