# ─────────────────────────────────────────────────────────────────────────────
# GBrain — complete single-file Dokploy deployment
#
# SERVICES:
#   postgres       pgvector/pgvector:pg16   Database            (internal)
#   gbrain         built from Dockerfile    MCP HTTP server     (Traefik :8787)
#   gbrain-worker  same image               Minions supervisor  (internal)
#
# DATABASE URL FORMAT:
#   GBrain's init validator expects Supabase pooler dot-notation in username:
#   postgresql://postgres.gbrain:PASSWORD@postgres:5432/postgres
#   The init.sh script creates this "postgres.gbrain" superuser on first boot.
#
# PERSISTENT STORAGE: /var/www/hilvara/gbrain/{postgres,brain,config}
#
# DOKPLOY SETUP:
#   1. New Project → New Service → Compose → GitHub → this repo
#   2. Compose Path: ./docker-compose.yml
#   3. Environment tab → set variables (see README)
#   4. Domains tab → service: gbrain → port: 8787 → brain.shapememory.eu
#   5. Deploy
#   6. Terminal: create Bearer tokens
#   7. Schedule Jobs: add 4 maintenance jobs
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Postgres 16 + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: postgres
    volumes:
      - /var/www/hilvara/gbrain/postgres:/var/lib/postgresql/data
      # Shell init script — interpolates POSTGRES_PASSWORD to create
      # the postgres.gbrain superuser GBrain's URL validator expects.
      - ./init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - gbrain-internal

  # ── GBrain MCP Server ───────────────────────────────────────────────────────
  gbrain:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GBRAIN_REF: master
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Dot-notation username satisfies GBrain's Supabase pooler URL validator
      DATABASE_URL: postgresql://postgres.gbrain:${POSTGRES_PASSWORD}@postgres:5432/postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GBRAIN_PORT: "8787"
      GBRAIN_BRAIN_PATH: /brain
    volumes:
      - /var/www/hilvara/gbrain/brain:/brain
      - /var/www/hilvara/gbrain/config:/root/.gbrain
    entrypoint: ["/entrypoint.sh"]
    networks:
      - gbrain-internal
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.gbrain.rule=Host(`${GBRAIN_DOMAIN:?GBRAIN_DOMAIN is required}`)"
      - "traefik.http.routers.gbrain.entrypoints=websecure"
      - "traefik.http.routers.gbrain.tls=true"
      - "traefik.http.routers.gbrain.tls.certresolver=letsencrypt"
      - "traefik.http.routers.gbrain.service=gbrain-svc"
      - "traefik.http.services.gbrain-svc.loadbalancer.server.port=8787"
      - "traefik.http.routers.gbrain-http.rule=Host(`${GBRAIN_DOMAIN}`)"
      - "traefik.http.routers.gbrain-http.entrypoints=web"
      - "traefik.http.routers.gbrain-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"  

  # ── GBrain Minions Worker ───────────────────────────────────────────────────
  gbrain-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      gbrain:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres.gbrain:${POSTGRES_PASSWORD}@postgres:5432/postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GBRAIN_PORT: "8787"
      GBRAIN_BRAIN_PATH: /brain
      MINIONS_CONCURRENCY: ${MINIONS_CONCURRENCY:-4}
    volumes:
      - /var/www/hilvara/gbrain/brain:/brain
      - /var/www/hilvara/gbrain/config:/root/.gbrain
    entrypoint: ["/worker-entrypoint.sh"]
    networks:
      - gbrain-internal

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  gbrain-internal:
    driver: bridge        # postgres ↔ gbrain ↔ gbrain-worker (private)

  dokploy-network:
    external: true        # Dokploy creates this — Traefik routing for gbrain
